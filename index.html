<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>С 8 Марта 🌸</title>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-top: 80px;
    background: #111;
    position: relative;
  }

  .bg-slider {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
  }

  .bg-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transform: scale(1);
    transition: opacity 2s ease, transform 8s ease;
  }

  .bg-slide.active {
    opacity: 1;
    transform: scale(1.1);
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: -1;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(10px);
    color: white;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
  }

  .logo {
    font-size: 18px;
    font-weight: bold;
  }

  .card {
    width: 100%;
    max-width: 500px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    color: white;
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    margin: 20px;
    z-index: 2;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 15px;
  }

  #message {
    font-size: 18px;
    line-height: 1.5;
    min-height: 110px;
    white-space: pre-line;
    margin-bottom: 10px;
  }

  #extraWish {
    margin-top: 10px;
    font-size: 18px;
  }

  #flowerCounter {
    font-size: 16px;
    margin-top: 15px;
    opacity: 0.9;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: bold;
    background: white;
    cursor: pointer;
    margin-top: 12px;
    transition: 0.25s;
  }

  button:hover {
    transform: translateY(-2px);
  }

  button:active {
    transform: scale(0.96);
  }

  input,
  textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
  }

  textarea {
    resize: none;
    min-height: 80px;
  }

  footer {
    width: 100%;
    max-width: 500px;
    background: rgba(0, 0, 0, 0.55);
    padding: 20px;
    color: white;
    margin: 20px;
    border-radius: 25px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    z-index: 2;
  }

  #commentsList {
    margin-top: 15px;
    text-align: left;
  }

  #commentsList div {
    background: rgba(255, 255, 255, 0.18);
    padding: 10px;
    border-radius: 10px;
    margin-top: 8px;
    font-size: 15px;
    word-wrap: break-word;
  }

  .flower {
    position: fixed;
    top: -50px;
    font-size: 22px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes fall {
    0% {
      transform: translateY(-50px) rotate(0deg);
    }
    100% {
      transform: translateY(120vh) rotate(360deg);
    }
  }

  .heart {
    position: absolute;
    font-size: 22px;
    animation: heartFly 2s forwards;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes heartFly {
    0% {
      opacity: 1;
      transform: scale(0);
    }
    100% {
      opacity: 0;
      transform: translateY(-200px) scale(1.5);
    }
  }

  .bouquet {
    position: absolute;
    font-size: 35px;
    animation: bouquetFly 2s forwards;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes bouquetFly {
    0% {
      opacity: 1;
      transform: translateY(0) scale(0.8);
    }
    100% {
      opacity: 0;
      transform: translateY(-120px) scale(1.2);
    }
  }

  .confetti {
    position: absolute;
    top: -10px;
    width: 8px;
    height: 8px;
    animation: confettiFall linear forwards;
    z-index: 3;
  }

  @keyframes confettiFall {
    to {
      transform: translateY(110vh) rotate(720deg);
    }
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.6;
    animation: particleMove linear infinite;
    z-index: 0;
  }

  @keyframes particleMove {
    from {
      transform: translateY(0);
    }
    to {
      transform: translateY(-100vh);
    }
  }

  #thanksScreen {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 30px;
    color: white;
    padding: 20px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: 0.35s;
  }

  #thanksScreen.show {
    opacity: 1;
    pointer-events: auto;
  }

  #intro {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background:
      radial-gradient(circle at top, rgba(255, 255, 255, 0.25), transparent 35%),
      linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    z-index: 9999;
    transition: opacity 1s ease, visibility 1s ease;
  }

  #intro.hide {
    opacity: 0;
    visibility: hidden;
  }

  .intro-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    padding: 30px 20px;
    max-width: 600px;
    animation: introZoom 1.4s ease;
  }

  .intro-flower {
    font-size: 72px;
    margin-bottom: 14px;
    animation: floatFlower 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.45));
  }

  .intro-title {
    font-size: 46px;
    font-weight: bold;
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    animation: glowText 2s ease-in-out infinite alternate;
  }

  .intro-subtitle {
    font-size: 20px;
    opacity: 0.95;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .intro-button {
    width: auto;
    padding: 14px 28px;
    border: none;
    border-radius: 999px;
    background: white;
    color: #d14d72;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .intro-button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
  }

  .intro-petal {
    position: absolute;
    top: -40px;
    font-size: 20px;
    opacity: 0.9;
    animation: petalFall linear forwards;
    pointer-events: none;
  }

  @keyframes petalFall {
    0% {
      transform: translateY(-40px) translateX(0) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(60px) rotate(360deg);
      opacity: 0.85;
    }
  }

  @keyframes introZoom {
    from {
      opacity: 0;
      transform: scale(0.85) translateY(20px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  @keyframes floatFlower {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-10px);
    }
  }

  @keyframes glowText {
    from {
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.25), 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    to {
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.55), 0 4px 24px rgba(0, 0, 0, 0.28);
    }
  }

  .author {
    margin-top: 18px;
    font-size: 14px;
    text-align: center;
    opacity: 0.9;
  }

  .author a {
    color: #ff9ecf;
    text-decoration: none;
  }

  .author a:hover {
    text-decoration: underline;
  }

  @media (max-width: 500px) {
    .card,
    footer {
      margin: 15px;
      width: calc(100% - 30px);
    }

    .card {
      padding: 20px;
    }

    h1 {
      font-size: 24px;
    }

    #message {
      font-size: 16px;
    }

    button {
      font-size: 16px;
      padding: 13px;
    }

    header {
      padding: 0 14px;
    }

    .logo {
      font-size: 16px;
    }

    .intro-title {
      font-size: 34px;
    }

    .intro-subtitle {
      font-size: 17px;
    }

    .intro-flower {
      font-size: 58px;
    }

    .intro-button {
      padding: 13px 22px;
      font-size: 16px;
    }
  }

#secretButton {
  background: linear-gradient(135deg, #ffccd5, #ffd6f6);
  color: #8a2d52;
}

#secretButton:hover {
  transform: translateY(-2px) scale(1.02);
}

#videoModal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.82);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 10000;
  opacity: 0;
  pointer-events: none;
  transition: 0.35s ease;
}

#videoModal.show {
  opacity: 1;
  pointer-events: auto;
}

.video-box {
  width: 100%;
  max-width: 700px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(14px);
  border-radius: 24px;
  padding: 20px;
  text-align: center;
  color: white;
  position: relative;
  box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
  animation: videoPop 0.35s ease;
}

.video-box h2 {
  margin-bottom: 10px;
  font-size: 28px;
}

.video-box p {
  margin-bottom: 14px;
  font-size: 17px;
  opacity: 0.95;
}

.video-box video {
  width: 100%;
  border-radius: 18px;
  display: block;
  background: black;
  max-height: 70vh;
}

.close-video {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 50%;
  background: white;
  color: #c24b78;
  font-size: 18px;
  cursor: pointer;
  margin-top: 0;
  padding: 0;
}

@keyframes videoPop {
  from {
    opacity: 0;
    transform: scale(0.9) translateY(15px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@media (max-width: 500px) {
  .video-box {
    padding: 16px;
  }

  .video-box h2 {
    font-size: 22px;
  }

  .video-box p {
    font-size: 15px;
  }
}


</style>

      const flower = document.createElement("div");
      flower.className = "flower";

    document.addEventListener("click", (e) => {

    async function shareSite() {
  const shareData = {
    title: "С 8 Марта 🌸",
    text: "Посмотри красивое поздравление с 8 Марта 🌸",
    url: window.location.href
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch (error) {
      console.log("Поделиться не удалось:", error);
    }
  } else {
    try {
      await navigator.clipboard.writeText(window.location.href);
      alert("Ссылка скопирована!");
    } catch (error) {
      alert("Не удалось скопировать ссылку");
    }
  }
}

function createIntroPetal() {
  const intro = document.getElementById("intro");
  if (!intro || intro.classList.contains("hide")) return;

  const petal = document.createElement("div");
  petal.className = "intro-petal";
  petal.textContent = "🌸";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = 4 + Math.random() * 4 + "s";
  petal.style.fontSize = 16 + Math.random() * 18 + "px";

  intro.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 9000);
}

const introPetalInterval = setInterval(createIntroPetal, 250);

function closeIntro() {
  const intro = document.getElementById("intro");
  intro.classList.add("hide");

  setTimeout(() => {
    intro.remove();
    clearInterval(introPetalInterval);
  }, 1000);
}

function showSecretVideo() {
  const modal = document.getElementById("videoModal");
  const video = document.getElementById("secretVideo");

  modal.classList.add("show");

  if (video) {
    video.currentTime = 0;
    video.play().catch(() => {});
  }
}

function closeSecretVideo() {
  const modal = document.getElementById("videoModal");
  const video = document.getElementById("secretVideo");

  modal.classList.remove("show");

  if (video) {
    video.pause();
    video.currentTime = 0;
  }
}
